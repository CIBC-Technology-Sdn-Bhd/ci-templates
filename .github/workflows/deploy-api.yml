name: Reusable Build & Deploy for API

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      image_name:
        required: true
        type: string
      caprover_url:
        required: true
        type: string
      gitlab_username:
        required: true
        type: string
      environment_name:
        required: false
        type: string
        default: ""
      dockerfile_path:
        required: false
        type: string
        default: "WebApi/Dockerfile"
      project_path:
        required: false
        type: string
        default: "WebApi/WebApi.csproj"
      publish_output:
        required: false
        type: string
        default: "publish"
      build_context:
        required: false
        type: string
        default: "."
      dotnet_version:
        required: false
        type: string
        default: "6.0.x"
    secrets:
      CAPROVER_PASSWORD:
        required: true
      GITLAB_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: meta
        run: echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      # 🔥 .NET Setup + NuGet Cache
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # 🔥 Publish .NET App (from repo root, like Bitbucket)
      - name: Publish .NET App
        run: |
          dotnet publish ${{ inputs.project_path }} -c Release -o ${{ inputs.publish_output }} --self-contained false /p:UseAppHost=false /p:MaxCpuCount=1

      # 🔥 Docker Setup + Layer Cache via inline cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitLab Registry
        uses: docker/login-action@v3
        with:
          registry: registry.gitlab.com
          username: ${{ inputs.gitlab_username }}
          password: ${{ secrets.GITLAB_TOKEN }}

      # 🔥 Build with inline cache (simple & effective)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ${{ inputs.image_name }}:${{ steps.meta.outputs.tag }}
            ${{ inputs.image_name }}:latest
          cache-from: type=registry,ref=${{ inputs.image_name }}:buildcache
          cache-to: type=registry,ref=${{ inputs.image_name }}:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment_name != '' && inputs.environment_name || null }}
    steps:
      - name: Deploy to CapRover
        run: |
          npm install -g caprover
          caprover deploy \
            --caproverUrl ${{ inputs.caprover_url }} \
            --caproverPassword ${{ secrets.CAPROVER_PASSWORD }} \
            --appName ${{ inputs.app_name }} \
            --imageName ${{ inputs.image_name }}:${{ needs.build.outputs.image_tag }}