name: Reusable Cloudflare Pages Deploy

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '22'
      cf-project-staging:
        description: 'Cloudflare Pages Project Name for Staging'
        required: true
        type: string
      cf-project-prod:
        description: 'Cloudflare Pages Project Name for Production'
        required: true
        type: string
      staging-branch:
        description: 'Branch name for Staging deployments'
        required: true
        type: string
      production-branch:
        description: 'Branch name for Production deployments'
        required: true
        type: string
      build-command:
        description: 'Command to build the app'
        required: false
        type: string
        default: 'npm run build'
      install-command:
        description: 'Command to install dependencies'
        required: false
        type: string
        default: 'npm ci'
      build-output-dir:
        description: 'Build output directory'
        required: false
        type: string
        default: 'dist/spa'
      wrangler-version:
        description: 'Wrangler CLI version'
        required: false
        type: string
        default: 'latest'
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: 'Cloudflare API Token with Pages permissions'
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        description: 'Cloudflare Account ID'
        required: false

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.ref_name == inputs.production-branch && 'Production' || 'Staging' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: ${{ inputs.install-command }}

      - name: Build Application
        run: ${{ inputs.build-command }}

      - name: Deploy to Cloudflare Pages (Staging)
        if: github.ref_name == inputs.staging-branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@${{ inputs.wrangler-version }} pages deploy ${{ inputs.build-output-dir }} --project-name=${{ inputs.cf-project-staging }}

      - name: Deploy to Cloudflare Pages (Production)
        if: github.ref_name == inputs.production-branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@${{ inputs.wrangler-version }} pages deploy ${{ inputs.build-output-dir }} --project-name=${{ inputs.cf-project-prod }}